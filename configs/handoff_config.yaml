models:
  htr:
    format: onnx
    source_checkpoint: outputs/checkpoints/htr_best.pt
    exported_model_path: outputs/exported/htr_model.onnx

    input:
      name: input
      dtype: float32
      shape: [1, 1, 28, 28]
      description: grayscale image tensor for handwriting recognition

    output:
      name: logits
      dtype: float32
      shape: [1, 10]
      description: classification logits

    serving:
      platform: triton
      max_batch_size: 32
      dynamic_batch: true

  retrieval:
    format: onnx
    source_checkpoint: outputs/checkpoints/retrieval_best.pt
    exported_model_path: outputs/exported/retrieval_model.onnx

    input:
      name: input_ids
      dtype: int64
      shape: [1, 128]
      description: tokenized text input for retrieval model

    output:
      name: embedding
      dtype: float32
      shape: [1, 128]
      embedding_dim: 128
      description: semantic embedding vector

    serving:
      platform: triton
      max_batch_size: 32
      dynamic_batch: true